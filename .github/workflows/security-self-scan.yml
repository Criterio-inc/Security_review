name: Security Self-Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Körs varje måndag kl 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Security Toolkit
        run: pip install -e .

      - name: Run Security Scan
        run: |
          security-scan repo . \
            --output security-report.json \
            --format json \
            --severity medium
        continue-on-error: true

      - name: Run Compliance Check
        run: |
          security-scan repo . \
            --framework gdpr \
            --framework nis2 \
            --framework owasp_top10 \
            --output compliance-report.json \
            --format json
        continue-on-error: true

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.json

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-report
          path: compliance-report.json

      - name: Display Summary
        if: always()
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f security-report.json ]; then
            echo "Security report generated successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "Warning: Security report not generated." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f compliance-report.json ]; then
            echo "Compliance report generated successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "Warning: Compliance report not generated." >> $GITHUB_STEP_SUMMARY
          fi
